AWSTemplateFormatVersion: '2010-09-09'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:

      - Label:
          default: "VPC Configuration"
        Parameters:
          - VPCName
          - VPCCidr

      - Label:
          default: "Subnet Configuration"
        Parameters:
          - SubnetCIDRs
          - SubnetAZs
          - SubnetNames
          - SubnetDescriptions

      - Label:
          default: "NAT Gateway Configuration"
        Parameters:
          - NatGatewaySubnetIndex

Parameters:

# ---------------- VPC PARAMETERS ----------------

  VPCName:
    Type: String

  VPCCidr:
    Type: String
    Default: 192.168.0.0/16


# ---------------- SUBNET PARAMETERS ----------------

  SubnetCIDRs:
    Type: List<String>
    Description: "List of subnet CIDR blocks (max 8)"

  SubnetAZs:
    Type: List<AWS::EC2::AvailabilityZone::Name>
    Description: "AZs for subnets (order must match CIDR list)"

  SubnetNames:
    Type: List<String>
    Description: "Names for each subnet"

  SubnetDescriptions:
    Type: List<String>
    Description: "Descriptions for each subnet"


# ---------------- NAT CONFIG ----------------

  NatGatewaySubnetIndex:
    Type: Number
    Default: 0
    Description: "Index of subnet where NAT Gateway should be placed (0 = first subnet)"


Resources:

# ---------------- VPC ----------------

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Ref VPCName


# ---------------- INTERNET GATEWAY ----------------

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC


# ---------------- NAT EIP ----------------

  NatEIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc


# ---------------- SUBNETS ----------------

  Subnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [0, !Ref SubnetCIDRs]
      AvailabilityZone: !Select [0, !Ref SubnetAZs]
      Tags:
        - Key: Name
          Value: !Select [0, !Ref SubnetNames]
        - Key: Description
          Value: !Select [0, !Ref SubnetDescriptions]

  Subnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [1, !Ref SubnetCIDRs]
      AvailabilityZone: !Select [1, !Ref SubnetAZs]
      Tags:
        - Key: Name
          Value: !Select [1, !Ref SubnetNames]
        - Key: Description
          Value: !Select [1, !Ref SubnetDescriptions]

  Subnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [2, !Ref SubnetCIDRs]
      AvailabilityZone: !Select [2, !Ref SubnetAZs]
      Tags:
        - Key: Name
          Value: !Select [2, !Ref SubnetNames]
        - Key: Description
          Value: !Select [2, !Ref SubnetDescriptions]

  Subnet4:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [3, !Ref SubnetCIDRs]
      AvailabilityZone: !Select [3, !Ref SubnetAZs]
      Tags:
        - Key: Name
          Value: !Select [3, !Ref SubnetNames]
        - Key: Description
          Value: !Select [3, !Ref SubnetDescriptions]

  Subnet5:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [4, !Ref SubnetCIDRs]
      AvailabilityZone: !Select [4, !Ref SubnetAZs]
      Tags:
        - Key: Name
          Value: !Select [4, !Ref SubnetNames]
        - Key: Description
          Value: !Select [4, !Ref SubnetDescriptions]

  Subnet6:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [5, !Ref SubnetCIDRs]
      AvailabilityZone: !Select [5, !Ref SubnetAZs]
      Tags:
        - Key: Name
          Value: !Select [5, !Ref SubnetNames]
        - Key: Description
          Value: !Select [5, !Ref SubnetDescriptions]

  Subnet7:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [6, !Ref SubnetCIDRs]
      AvailabilityZone: !Select [6, !Ref SubnetAZs]
      Tags:
        - Key: Name
          Value: !Select [6, !Ref SubnetNames]
        - Key: Description
          Value: !Select [6, !Ref SubnetDescriptions]

  Subnet8:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [7, !Ref SubnetCIDRs]
      AvailabilityZone: !Select [7, !Ref SubnetAZs]
      Tags:
        - Key: Name
          Value: !Select [7, !Ref SubnetNames]
        - Key: Description
          Value: !Select [7, !Ref SubnetDescriptions]


# ---------------- NAT GATEWAY ----------------

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Select
        - !Ref NatGatewaySubnetIndex
        - [!Ref Subnet1, !Ref Subnet2, !Ref Subnet3, !Ref Subnet4, !Ref Subnet5, !Ref Subnet6, !Ref Subnet7, !Ref Subnet8]


Outputs:

# ---------------- CORE OUTPUTS ----------------

  VPCId:
    Value: !Ref VPC
    Export:
      Name: !Sub "${AWS::StackName}-VPCId"

  InternetGatewayId:
    Value: !Ref InternetGateway
    Export:
      Name: !Sub "${AWS::StackName}-InternetGatewayId"

  NATGatewayId:
    Value: !Ref NatGateway
    Export:
      Name: !Sub "${AWS::StackName}-NatGatewayId"


# ---------------- SUBNET OUTPUTS ----------------

  SubnetIds:
    Value: !Join
      - ","
      - [!Ref Subnet1, !Ref Subnet2, !Ref Subnet3, !Ref Subnet4, !Ref Subnet5, !Ref Subnet6, !Ref Subnet7, !Ref Subnet8]
    Export:
      Name: !Sub "${AWS::StackName}-SubnetIds"

  SubnetNamesOutput:
    Value: !Join
      - ","
      - !Ref SubnetNames
    Export:
      Name: !Sub "${AWS::StackName}-SubnetNames"