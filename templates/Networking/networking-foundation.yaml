AWSTemplateFormatVersion: '2010-09-09'

Parameters:

  VPCName:
    Type: String

  VPCCidr:
    Type: String
    Default: 192.168.0.0/16


# -------- SUBNET PARAMETERS --------

  Subnet1Enabled:
    Type: String
    Default: true
    AllowedValues: [true, false]

  Subnet1Name:
    Type: String

  Subnet1Description:
    Type: String

  Subnet1CIDR:
    Type: String
    Default: 192.168.1.0/24

  Subnet1AZ:
    Type: AWS::EC2::AvailabilityZone::Name


  Subnet2Enabled:
    Type: String
    Default: false
    AllowedValues: [true, false]

  Subnet2Name:
    Type: String

  Subnet2Description:
    Type: String

  Subnet2CIDR:
    Type: String
    Default: 192.168.2.0/24

  Subnet2AZ:
    Type: AWS::EC2::AvailabilityZone::Name


  Subnet3Enabled:
    Type: String
    Default: false
    AllowedValues: [true, false]

  Subnet3Name:
    Type: String

  Subnet3Description:
    Type: String

  Subnet3CIDR:
    Type: String
    Default: 192.168.3.0/24

  Subnet3AZ:
    Type: AWS::EC2::AvailabilityZone::Name


  Subnet4Enabled:
    Type: String
    Default: false
    AllowedValues: [true, false]

  Subnet4Name:
    Type: String

  Subnet4Description:
    Type: String

  Subnet4CIDR:
    Type: String
    Default: 192.168.4.0/24

  Subnet4AZ:
    Type: AWS::EC2::AvailabilityZone::Name


  Subnet5Enabled:
    Type: String
    Default: false
    AllowedValues: [true, false]

  Subnet5Name:
    Type: String

  Subnet5Description:
    Type: String

  Subnet5CIDR:
    Type: String
    Default: 192.168.5.0/24

  Subnet5AZ:
    Type: AWS::EC2::AvailabilityZone::Name


  Subnet6Enabled:
    Type: String
    Default: false
    AllowedValues: [true, false]

  Subnet6Name:
    Type: String

  Subnet6Description:
    Type: String

  Subnet6CIDR:
    Type: String
    Default: 192.168.6.0/24

  Subnet6AZ:
    Type: AWS::EC2::AvailabilityZone::Name


  Subnet7Enabled:
    Type: String
    Default: false
    AllowedValues: [true, false]

  Subnet7Name:
    Type: String

  Subnet7Description:
    Type: String

  Subnet7CIDR:
    Type: String
    Default: 192.168.7.0/24

  Subnet7AZ:
    Type: AWS::EC2::AvailabilityZone::Name


  Subnet8Enabled:
    Type: String
    Default: false
    AllowedValues: [true, false]

  Subnet8Name:
    Type: String

  Subnet8Description:
    Type: String

  Subnet8CIDR:
    Type: String
    Default: 192.168.8.0/24

  Subnet8AZ:
    Type: AWS::EC2::AvailabilityZone::Name


Conditions:

  CreateSubnet1: !Equals [!Ref Subnet1Enabled, true]
  CreateSubnet2: !Equals [!Ref Subnet2Enabled, true]
  CreateSubnet3: !Equals [!Ref Subnet3Enabled, true]
  CreateSubnet4: !Equals [!Ref Subnet4Enabled, true]
  CreateSubnet5: !Equals [!Ref Subnet5Enabled, true]
  CreateSubnet6: !Equals [!Ref Subnet6Enabled, true]
  CreateSubnet7: !Equals [!Ref Subnet7Enabled, true]
  CreateSubnet8: !Equals [!Ref Subnet8Enabled, true]


Resources:

# ---------------- VPC ----------------

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Ref VPCName


# ---------------- IGW ----------------

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC


# ---------------- NAT ----------------

  NatEIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc


# NAT placed in subnet1 if created
  NatGateway:
    Type: AWS::EC2::NatGateway
    Condition: CreateSubnet1
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref Subnet1


# ---------------- SUBNETS ----------------

  Subnet1:
    Type: AWS::EC2::Subnet
    Condition: CreateSubnet1
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref Subnet1CIDR
      AvailabilityZone: !Ref Subnet1AZ
      Tags:
        - Key: Name
          Value: !Ref Subnet1Name
        - Key: Description
          Value: !Ref Subnet1Description


  Subnet2:
    Type: AWS::EC2::Subnet
    Condition: CreateSubnet2
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref Subnet2CIDR
      AvailabilityZone: !Ref Subnet2AZ
      Tags:
        - Key: Name
          Value: !Ref Subnet2Name
        - Key: Description
          Value: !Ref Subnet2Description


  Subnet3:
    Type: AWS::EC2::Subnet
    Condition: CreateSubnet3
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref Subnet3CIDR
      AvailabilityZone: !Ref Subnet3AZ
      Tags:
        - Key: Name
          Value: !Ref Subnet3Name
        - Key: Description
          Value: !Ref Subnet3Description


  Subnet4:
    Type: AWS::EC2::Subnet
    Condition: CreateSubnet4
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref Subnet4CIDR
      AvailabilityZone: !Ref Subnet4AZ
      Tags:
        - Key: Name
          Value: !Ref Subnet4Name
        - Key: Description
          Value: !Ref Subnet4Description


  Subnet5:
    Type: AWS::EC2::Subnet
    Condition: CreateSubnet5
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref Subnet5CIDR
      AvailabilityZone: !Ref Subnet5AZ
      Tags:
        - Key: Name
          Value: !Ref Subnet5Name
        - Key: Description
          Value: !Ref Subnet5Description


  Subnet6:
    Type: AWS::EC2::Subnet
    Condition: CreateSubnet6
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref Subnet6CIDR
      AvailabilityZone: !Ref Subnet6AZ
      Tags:
        - Key: Name
          Value: !Ref Subnet6Name
        - Key: Description
          Value: !Ref Subnet6Description


  Subnet7:
    Type: AWS::EC2::Subnet
    Condition: CreateSubnet7
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref Subnet7CIDR
      AvailabilityZone: !Ref Subnet7AZ
      Tags:
        - Key: Name
          Value: !Ref Subnet7Name
        - Key: Description
          Value: !Ref Subnet7Description


  Subnet8:
    Type: AWS::EC2::Subnet
    Condition: CreateSubnet8
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref Subnet8CIDR
      AvailabilityZone: !Ref Subnet8AZ
      Tags:
        - Key: Name
          Value: !Ref Subnet8Name
        - Key: Description
          Value: !Ref Subnet8Description


Outputs:

  VPCId:
    Value: !Ref VPC

  InternetGatewayId:
    Value: !Ref InternetGateway

  NATGatewayId:
    Condition: CreateSubnet1
    Value: !Ref NatGateway

  Subnet1Id:
    Condition: CreateSubnet1
    Value: !Ref Subnet1

  Subnet2Id:
    Condition: CreateSubnet2
    Value: !Ref Subnet2

  Subnet3Id:
    Condition: CreateSubnet3
    Value: !Ref Subnet3

  Subnet4Id:
    Condition: CreateSubnet4
    Value: !Ref Subnet4

  Subnet5Id:
    Condition: CreateSubnet5
    Value: !Ref Subnet5

  Subnet6Id:
    Condition: CreateSubnet6
    Value: !Ref Subnet6

  Subnet7Id:
    Condition: CreateSubnet7
    Value: !Ref Subnet7

  Subnet8Id:
    Condition: CreateSubnet8
    Value: !Ref Subnet8